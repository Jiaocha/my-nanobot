name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Quality gates thresholds
  RUFF_MAX_ERRORS: 100

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff
      
      - name: Run ruff check
        run: |
          ruff check nanobot --output-format=concise > ruff_output.txt 2>&1 || true
          ERROR_COUNT=$(wc -l < ruff_output.txt)
          cat ruff_output.txt
          echo "Ruff error count: $ERROR_COUNT (threshold: $RUFF_MAX_ERRORS)"
          if [ "$ERROR_COUNT" -gt "$RUFF_MAX_ERRORS" ]; then
            echo "::error::Ruff errors ($ERROR_COUNT) exceed threshold ($RUFF_MAX_ERRORS)"
            exit 1
          fi
      
      - name: Run ruff format check
        run: ruff format nanobot --check

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run tests
        run: |
          python -m pytest tests/ -v --ignore=tests/test_matrix_channel.py --tb=short \
            --junitxml=pytest.xml
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: pytest.xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install build dependencies
        run: |
          pip install --upgrade pip
          pip install build
      
      - name: Build package
        run: python -m build
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
